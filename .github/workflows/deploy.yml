name: Deploy to home server

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Github Container Registry Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build nix pkg
        run: nix build -L .#site

      - name: build docker image
        run: nix build -L .#siteImage

      - name: Load, tag and push Docker image to GHCR
        run: |
          docker load < result
          docker tag ed-thomas.dev:$(git rev-parse --short HEAD) ghcr.io/pixel-87/ed-thomas.dev:$(git rev-parse --short HEAD)
          docker push ghcr.io/pixel-87/ed-thomas.dev:$(git rev-parse --short HEAD)
