name: Deploy to home server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  packages: write

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            site/resources
            site/.hugo_build.lock
          key: ${{ runner.os }}-hugo-${{ hashFiles('site/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Github Container Registry Login
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site and image
        run: |
          # Build only the image since it includes the site
          # Use more parallel jobs and show progress
          nix build -L .#siteImage \
            --max-jobs 4 \
            --cores 0 \
            --show-trace

      - name: Load, tag and push Docker image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker load < result
          # Get the actual tag from the loaded image
          IMAGE_TAG=$(docker images --format "table {{.Tag}}" ed-thomas.dev | tail -n +2 | head -1)
          docker tag ed-thomas.dev:$IMAGE_TAG ghcr.io/pixel-87/ed-thomas.dev:$IMAGE_TAG
          docker tag ed-thomas.dev:$IMAGE_TAG ghcr.io/pixel-87/ed-thomas.dev:latest
          docker push ghcr.io/pixel-87/ed-thomas.dev:$IMAGE_TAG
          docker push ghcr.io/pixel-87/ed-thomas.dev:latest
