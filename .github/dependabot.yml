# Dependabot configuration for ed-thomas.dev
# Keep Hugo modules and GitHub Actions up to date

version: 2
updates:
  # Hugo modules (Go modules) in the site directory
  - package-ecosystem: "gomod"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
